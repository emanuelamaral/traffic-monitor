apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: fi-net
  namespace: fi
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "bridge",
    "bridge": "br-fi",
    "isGateway": false,
    "ipMasq": false,
    "hairpinMode": true,
    "capabilities": {
      "ips": true
    },
    "ipam": {
      "type": "host-local",
      "ranges": [
        [
          {
            "subnet": "11.0.0.0/24"
          }
        ]
      ]
    }
  }'
