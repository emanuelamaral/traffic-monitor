apiVersion: v1
kind: Pod
metadata:
  name: host-fi-1
  namespace: fi
  labels:
    app: host-fi-1
    role: host
    department: fi
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{ "name": "fi-net", "ips": [ "11.0.0.11/24" ] }]'
spec:
  containers:
    - name: host
      image: alpine:latest
      command: ["/bin/sh", "-lc"]
      args:
        - |
          apk add --no-cache curl mariadb-client busybox-extras iputils

          echo "[host-fi-1] Starting traffic generation..."

          while true; do
            echo "[host-fi-1] Accessing web-fi..."
            curl -s -o /dev/null -w "[host-fi-1] HTTP status: %{http_code}\n" http://11.0.0.22/ || true

            echo "[host-fi-1] Accessing mysql-fi..."
            mysql \
              -h 11.0.0.23 \
              -P 3306 \
              -ufi \
              -p123123 \
              financial \
              -e "SELECT NOW() AS access_time, 'host-fi-1' AS simulated_host;" || true

            sleep 10
          done
