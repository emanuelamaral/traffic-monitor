apiVersion: v1
kind: Pod
metadata:
  name: tcpreplay-dev
  namespace: dev
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{ "name": "dev-net", "ips": [ "12.0.0.50/24" ] }]'
spec:
  restartPolicy: Never
  containers:
    - name: tcpreplay
      image: alpine:latest
      securityContext:
        privileged: true
      command: ["/bin/sh", "-lc"]
      args:
        - |
          apk add --no-cache tcpreplay coreutils iproute2

          echo "==== tcpreplay test started ===="
          echo "Start UTC: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Interface: net1"
          echo "PCAP directory: /pcaps"
          echo "Iterations: 20"
          echo ""

          ip addr show net1 || true
          echo ""

          for i in $(seq 1 20); do
            PCAP="$(shuf -e smallFlows.pcap bigFlows.pcap -n 1)"
            FULL_PATH="/pcaps/$PCAP"

            echo "============================================================"
            echo "Iteration: $i"
            echo "Timestamp UTC: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "Selected PCAP: $PCAP"
            echo "PCAP size bytes: $(stat -c%s "$FULL_PATH")"
            echo "Command: tcpreplay -i net1 $FULL_PATH"
            echo "------------------------------------------------------------"

            tcpreplay -i net1 "$FULL_PATH"

            echo "------------------------------------------------------------"
            echo "Finished iteration: $i"
            echo "Finished UTC: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo ""

            sleep 2
          done

          echo "==== tcpreplay test finished ===="
          echo "End UTC: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      volumeMounts:
        - name: pcaps
          mountPath: /pcaps
  volumes:
    - name: pcaps
      hostPath:
        path: /home/youruser/dev-department/pcaps
        type: Directory
