apiVersion: v1
kind: Pod
metadata:
  name: host-dev-2
  namespace: dev
  labels:
    app: host-dev-2
    role: host
    department: dev
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{ "name": "dev-net", "ips": [ "12.0.0.12/24" ] }]'
spec:
  containers:
    - name: host
      image: alpine:latest
      command: ["/bin/sh", "-lc"]
      args:
        - |
          apk add --no-cache curl mariadb-client busybox-extras iputils

          echo "[host-dev-2] Starting traffic generation..."

          while true; do
            echo "[host-dev-2] Accessing web-dev..."
            curl -s -A "host-dev-2-client" http://12.0.0.22/ >/dev/null || true

            echo "[host-dev-2] Accessing mysql-dev..."
            mysql \
              -h 12.0.0.23 \
              -P 3306 \
              -udev \
              -p123123 \
              development \
              -e "SHOW DATABASES;" || true

            sleep 15
          done
