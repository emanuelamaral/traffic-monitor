apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: internet-net
  namespace: hr
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "internet-net",
    "type": "bridge",
    "bridge": "br-internet",
    "isGateway": false,
    "ipMasq": false,
    "hairpinMode": true,
    "capabilities": {
      "ips": true
    },
    "ipam": {
      "type": "host-local",
      "ranges": [
        [
          {
            "subnet": "192.168.0.0/24"
          }
        ]
      ]
    }
  }'
