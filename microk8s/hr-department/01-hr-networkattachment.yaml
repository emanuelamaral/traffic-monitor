apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: hr-net
  namespace: hr
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "hr-net",
    "type": "bridge",
    "bridge": "br-hr",
    "isGateway": false,
    "ipMasq": false,
    "hairpinMode": true,
    "capabilities": {
      "ips": true
    },
    "ipam": {
      "type": "host-local",
      "ranges": [
        [
          {
            "subnet": "10.0.0.0/24"
          }
        ]
      ],
      "routes": [
        {
          "dst": "192.168.0.0/24",
          "gw": "10.0.0.253"
        }
      ]
    }
  }'
