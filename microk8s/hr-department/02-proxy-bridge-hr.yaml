apiVersion: v1
kind: Pod
metadata:
  name: proxy-bridge
  namespace: hr
  annotations:
    k8s.v1.cni.cncf.io/networks: |
      [
        { "name": "hr-proxy-net", "interface": "net1", "ips": [ "10.0.0.253/24" ] },
        { "name": "internet-net",  "interface": "net2", "ips": [ "192.168.0.253/24" ] }
      ]
spec:
  containers:
    - name: proxy
      image: alpine:3.20
      securityContext:
        privileged: true
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache iptables ip6tables iproute2 kmod tcpdump || true

          for i in $(seq 1 30); do
            ip link show net1 >/dev/null 2>&1 && ip link show net2 >/dev/null 2>&1 && break
            sleep 1
          done

          sysctl -w net.ipv4.ip_forward=1 || true
          sysctl -w net.ipv4.conf.all.rp_filter=0 || true
          sysctl -w net.ipv4.conf.default.rp_filter=0 || true
          sysctl -w net.ipv4.conf.net1.rp_filter=0 || true
          sysctl -w net.ipv4.conf.net2.rp_filter=0 || true

          ip route replace 10.0.0.0/24 dev net1 src 10.0.0.253 || true
          ip route replace 192.168.0.0/24 dev net2 src 192.168.0.253 || true

          iptables -F FORWARD || true
          iptables -t nat -F POSTROUTING || true

          iptables -P FORWARD ACCEPT || true
          iptables -A FORWARD -i net2 -s 192.168.0.0/24 -o net1 -d 10.0.0.0/24 -j ACCEPT || true
          iptables -A FORWARD -i net1 -s 10.0.0.0/24 -o net2 -d 192.168.0.0/24 -j ACCEPT || true

          ip route

          tail -f /dev/null
