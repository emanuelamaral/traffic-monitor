services:
  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.5.1'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - 'zookeeper-data:/var/lib/zookeeper/data'
      - 'zookeeper-log:/var/lib/zookeeper/log'
    healthcheck:
      test:
        - CMD-SHELL
        - 'echo srvr | nc -w 3 localhost 2181 | grep -q "Mode:" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  kafka:
    image: 'confluentinc/cp-kafka:7.5.1'
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - 'kafka-data:/var/lib/kafka/data'
    labels:
      - traefik.enable=true
      - 'traefik.tcp.routers.kafka.rule=HostSNI(`*`)'
      - traefik.tcp.routers.kafka.entrypoints=kafka
      - traefik.tcp.routers.kafka.service=kafka-service
      - traefik.tcp.services.kafka-service.loadbalancer.server.port=9094
    healthcheck:
      test:
        - CMD-SHELL
        - 'kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
  logstash:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - './logstash/pipeline:/usr/share/logstash/pipeline'
      - './logstash/config:/usr/share/logstash/config'
    environment:
      KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'
      KAFKA_TOPIC: nids-logs
      KAFKA_GROUP_ID: logstash-nids-group
      OPENSEARCH_HOSTS: '${OPENSEARCH_HOSTS}'
      OPENSEARCH_USER: '${OPENSEARCH_USER}'
      OPENSEARCH_PASSWORD: '${OPENSEARCH_PASSWORD}'
    ports:
      - '5044:5044'
      - '9600:9600'
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS http://localhost:9600/_node/pipelines >/dev/null || exit 1'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
volumes:
  zookeeper-data: null
  zookeeper-log: null
  kafka-data: null
