services:
  opensearch-node1:
    image: 'opensearchproject/opensearch:2.19.1'
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - 'discovery.seed_hosts=opensearch-node1,opensearch-node2'
      - 'cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2'
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
      - 'OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}'
      - plugins.security.ssl.http.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - 'opensearch-data1:/usr/share/opensearch/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS -u admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null || exit 1'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  opensearch-node2:
    image: 'opensearchproject/opensearch:2.19.1'
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node2
      - 'discovery.seed_hosts=opensearch-node1,opensearch-node2'
      - 'cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2'
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
      - 'OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}'
      - plugins.security.ssl.http.enabled=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.os-api.rule=Host(`${OPENSEARCH_PUBLIC_HOST}`)
      - traefik.http.routers.os-api.entrypoints=https
      - traefik.http.routers.os-api.tls=true
      - traefik.http.routers.os-api.service=os-api-service
      - traefik.http.services.os-api-service.loadbalancer.server.port=9200
      - traefik.http.services.os-api-service.loadbalancer.server.scheme=http
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - 'opensearch-data2:/usr/share/opensearch/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS -u admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null || exit 1'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  opensearch-dashboards:
    image: 'opensearchproject/opensearch-dashboards:2.19.1'
    depends_on:
      opensearch-node2:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200","http://opensearch-node2:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: '${OPENSEARCH_INITIAL_ADMIN_PASSWORD}'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.osdash-http.rule=Host(`${OPENSEARCH_DASHBOARDS_PUBLIC_HOST}`)
      - traefik.http.routers.osdash-http.entrypoints=http
      - traefik.http.routers.osdash-http.middlewares=redirect-to-https
      - traefik.http.routers.osdash-http.service=osdash-service
      - traefik.http.routers.osdash.rule=Host(`${OPENSEARCH_DASHBOARDS_PUBLIC_HOST}`)
      - traefik.http.routers.osdash.entrypoints=https
      - traefik.http.routers.osdash.tls=true
      - traefik.http.routers.osdash.tls.certresolver=letsencrypt
      - traefik.http.routers.osdash.priority=1000
      - traefik.http.routers.osdash.middlewares=gzip
      - traefik.http.routers.osdash.service=osdash-service
      - traefik.http.services.osdash-service.loadbalancer.server.port=5601
      - traefik.http.services.osdash-service.loadbalancer.server.scheme=http
    healthcheck:
      test:
        - CMD-SHELL
        - '/usr/share/opensearch-dashboards/node/bin/node -e "require(\"http\").get(\"http://127.0.0.1:5601/api/status\", r => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on(\"error\", () => process.exit(1))"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  grafana:
    image: 'grafana/grafana:11.6.6'
    volumes:
      - 'grafana-storage:/var/lib/grafana'
    environment:
      - 'GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}'
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.grafana-gzip.compress=true
      - traefik.http.middlewares.grafana-redirect.redirectscheme.scheme=https
      - traefik.http.routers.grafana-http.rule=Host(`${GRAFANA_PUBLIC_HOST}`)
      - traefik.http.routers.grafana-http.entrypoints=http
      - traefik.http.routers.grafana-http.middlewares=grafana-redirect
      - traefik.http.routers.grafana-http.service=grafana-service
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_PUBLIC_HOST}`)
      - traefik.http.routers.grafana.entrypoints=https
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.grafana.middlewares=grafana-gzip
      - traefik.http.routers.grafana.service=grafana-service
      - traefik.http.services.grafana-service.loadbalancer.server.port=3000
      - traefik.http.services.grafana-service.loadbalancer.server.scheme=http
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q -O - http://localhost:3000/api/health | grep -q "ok" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
volumes:
  opensearch-data1: null
  opensearch-data2: null
